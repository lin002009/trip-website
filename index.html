<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>京阪旅遊 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --sakura: #D4537E;
            --sakura-light: #FBEAF0;
            --ink: #2C2C2A;
            --muted: #8E8E93;
            --bg: #FFFFFF;
            --card-bg: #F9F9F9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            line-height: 1.5;
        }

        /* Header 樣式優化 */
        .header {
            background: var(--sakura-light);
            padding: 50px 20px 20px; /* 留出上方狀態列空間 */
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-main { font-size: 24px; font-weight: 700; color: #4B1528; }
        .header-sub { font-size: 14px; color: #993556; opacity: 0.8; }

        /* 導覽列固定在底部更有 App 感 */
        .tab-bar {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 0.5px solid #E5E5EA;
            padding-bottom: env(safe-area-inset-bottom); /* 適配 iPhone 底部橫條 */
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            transition: 0.2s;
        }

        .tab.active { color: var(--sakura); font-weight: 600; }
        .tab i { display: block; font-size: 22px; margin-bottom: 2px; }

        /* 行程卡片優化 */
        .content { padding: 15px 15px 100px; }
        
        .day-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 16px;
            border: 1px solid #F0F0F0;
        }

        .day-header { display: flex; align-items: center; justify-content: space-between; }
        .day-title { font-size: 18px; font-weight: 600; }
        .day-num { font-size: 12px; color: var(--sakura); font-weight: 700; margin-bottom: 4px; }

        .item {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 0.5px solid #EEE;
        }

        .item-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .transport { background: #E6F1FB; color: #185FA5; }
        .sight { background: #EAF3DE; color: #3B6D11; }
        .food { background: #FAEEDA; color: #854F0B; }

        .item-name { font-size: 14px; font-weight: 500; }
        .item-meta { font-size: 12px; color: var(--muted); }

        .badge {
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
            background: #EAF3DE; color: #27500A; margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-sub">5/15 — 5/22 · 8天7夜</div>
    <div class="header-main">京都 · 大阪旅遊</div>
</div>

<div class="content" id="main-content">
    <div class="day-card">
        <div class="day-num">DAY 1 · 5/15 (四)</div>
        <div class="day-header">
            <div class="day-title">桃園 → 關西機場</div>
            <i class="ti ti-plane-departure" style="color: var(--sakura)"></i>
        </div>
        <div class="item">
            <div class="item-icon transport"><i class="ti ti-train"></i></div>
            <div class="item-body">
                <div class="item-name">桃園機場 → 關西機場</div>
                <div class="item-meta">11:05 出發 · 捷星航空</div>
            </div>
        </div>
        <div class="item">
            <div class="item-icon hotel"><i class="ti ti-building" style="color:#993556"></i></div>
            <div class="item-body">
                <div class="item-name">ホテルヴィスキオ京都<span class="badge">已預約</span></div>
                <div class="item-meta">京都車站旁 · 15:00 Check-in</div>
            </div>
        </div>
    </div>

    <div class="day-card">
        <div class="day-num">DAY 2 · 5/16 (五)</div>
        <div class="day-title">宇治 · 伏見稻荷</div>
        <div class="item">
            <div class="item-icon sight"><i class="ti ti-building-temple"></i></div>
            <div class="item-body">
                <div class="item-name">平等院鳳凰堂</div>
                <div class="item-meta">門票 ¥1,000 · 預約 09:10</div>
            </div>
        </div>
        <div class="item">
            <div class="item-icon food"><i class="ti ti-cup"></i></div>
            <div class="item-body">
                <div class="item-name">中村藤吉本店</div>
                <div class="item-meta">抹茶名店 · 預算 ¥2,500</div>
            </div>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab active"><i class="ti ti-calendar-event"></i>行程</div>
    <div class="tab"><i class="ti ti-wallet"></i>預算</div>
    <div class="tab"><i class="ti ti-info-circle"></i>資訊</div>
</nav>

</body>
</html>
